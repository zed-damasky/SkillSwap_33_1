name: Publish Docker on Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repository structure
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls -la backend/ 2>/dev/null || echo "backend/ not found"
          ls -la frontend/ 2>/dev/null || echo "frontend/ not found"
          test -f backend/Dockerfile && echo "backend/Dockerfile: EXISTS" || echo "backend/Dockerfile: MISSING"
          test -f frontend/Dockerfile && echo "frontend/Dockerfile: EXISTS" || echo "frontend/Dockerfile: MISSING"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillswap-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/skillswap-backend:latest
          provenance: false
          sbom: false

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillswap-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/skillswap-frontend:latest
          provenance: false
          sbom: false